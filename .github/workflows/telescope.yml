name: Telescope (CI preview)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  telescope:
    name: Telescope (packages/test-files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Run Telescope (CI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          bun ./packages/telescope-server/src/cli/index.ts ci \
            --workspace packages/test-files \
            --comment-pr \
            --comment-review \
            --report-md telescope-report.md

      - name: Upload Telescope report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telescope-report
          path: telescope-report.md


