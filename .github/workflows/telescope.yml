name: Telescope (CI preview)

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  telescope:
    name: Telescope (test-files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Bun runner
        run: bash server/lsp/bun/runner/build.sh

      - name: Run Telescope (CI)
        working-directory: server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          go run . ci \
            ../test-files/openapi/ \
            --comment-pr \
            --report-md ../telescope-report.md

      - name: Upload Telescope report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telescope-report
          path: telescope-report.md
