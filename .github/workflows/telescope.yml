name: Telescope (CI preview)

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write

jobs:
  telescope:
    name: Telescope (test-files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Telescope (CI)
        id: telescope_ci
        continue-on-error: true
        uses: ./
        with:
          mode: ci
          paths: test-files/openapi/
          comment-pr: true
          report-md: telescope-report.md
          report-json: telescope-report.json
          report-sarif: telescope-report.sarif

      - name: Build telescope binary for fix guard
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
      - name: Run telescope fix --dry-run over test-files
        id: telescope_fix_guard
        continue-on-error: true
        run: |
          cd server
          go build -o ../telescope .
          cd ..
          # If any patches would apply, fail the job so the committed
          # fixtures stay stable. This is the Phase 3 guard: a broken
          # codemod that rewrites unrelated fixtures gets caught here
          # before it ships.
          OUTPUT=$(./telescope fix --dry-run test-files/openapi/ 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "^=== "; then
            echo "::error::telescope fix --dry-run would rewrite test-files; review the diff above."
            exit 1
          fi

      - name: Upload Telescope SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: telescope-report.sarif

      - name: Upload Telescope report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telescope-report
          path: |
            telescope-report.md
            telescope-report.json
            telescope-report.sarif

      - name: Summarize Telescope preview
        if: always()
        run: |
          {
            echo "## Telescope preview"
            echo ""
            echo "- CI preview step: ${{ steps.telescope_ci.conclusion }}"
            echo "- Report artifact: telescope-report"
            echo "- SARIF uploaded: telescope-report.sarif"
          } >> "$GITHUB_STEP_SUMMARY"
