name: Telescope (CI preview)

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write

jobs:
  telescope:
    name: Telescope (test-files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Telescope (CI)
        id: telescope_ci
        continue-on-error: true
        uses: ./
        with:
          mode: ci
          paths: test-files/openapi/
          comment-pr: true
          report-md: telescope-report.md
          report-json: telescope-report.json
          report-sarif: telescope-report.sarif

      - name: Upload Telescope SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: telescope-report.sarif

      - name: Upload Telescope report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telescope-report
          path: |
            telescope-report.md
            telescope-report.json
            telescope-report.sarif

      - name: Summarize Telescope preview
        if: always()
        run: |
          {
            echo "## Telescope preview"
            echo ""
            echo "- CI preview step: ${{ steps.telescope_ci.conclusion }}"
            echo "- Report artifact: telescope-report"
            echo "- SARIF uploaded: telescope-report.sarif"
          } >> "$GITHUB_STEP_SUMMARY"
