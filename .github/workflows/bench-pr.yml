name: Benchmark PR Comparison

on:
  pull_request:
    branches: [main]
    paths:
      - "server/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  benchmark-compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Benchmark base
        id: bench-base
        continue-on-error: true
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          if [ -f server/go.mod ]; then
            cd server && go test ./... -run='^$' -bench=. -benchmem -count=5 -timeout=30m > ../main.txt
          else
            echo "No Go server on base branch, skipping base benchmark"
          fi

      - name: Benchmark PR
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          cd server && go test ./... -run='^$' -bench=. -benchmem -count=5 -timeout=30m > ../pr.txt

      - name: Compare with benchstat
        id: benchstat
        run: |
          if [ -f main.txt ]; then
            result=$(benchstat main.txt pr.txt 2>&1 || true)
          else
            result="No base benchmark available (base branch has no Go server). PR benchmarks completed successfully."
          fi
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$result" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Benchmark Comparison (main vs this PR)\n\n\`\`\`\n${process.env.BENCHSTAT_RESULT}\n\`\`\`\n\n<sub>Generated by benchmark CI</sub>`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Benchmark Comparison'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          BENCHSTAT_RESULT: ${{ steps.benchstat.outputs.result }}
