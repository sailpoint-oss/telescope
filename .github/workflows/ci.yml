name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Build
        run: go build ./...
        working-directory: server

      - name: Vet
        run: go vet ./...
        working-directory: server

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./... -timeout 10m
        working-directory: server

      - name: Coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -func=coverage.out | tail -1
        working-directory: server

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: server/coverage.out

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Run unit tests
        run: pnpm test

      - name: Build extension
        run: |
          pnpm --filter telescope-server run build
          pnpm --filter ./packages/telescope-client run build

  e2e:
    name: E2E (${{ matrix.os }})
    needs: [go, typescript]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: oven-sh/setup-bun@v2

      - name: Restore VS Code test downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.vscode-test
            ${{ runner.temp }}/.vscode-test
          key: vscode-test-${{ matrix.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            vscode-test-${{ matrix.os }}-

      - name: Install dependencies
        run: pnpm install

      - name: Build and compile E2E
        run: pnpm --filter ./packages/telescope-client test:e2e:compile

      - name: Run E2E tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          xvfb-run -a pnpm --filter ./packages/telescope-client test:e2e:run:single
          xvfb-run -a pnpm --filter ./packages/telescope-client test:e2e:run:multi

      - name: Run E2E tests (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        run: |
          pnpm --filter ./packages/telescope-client test:e2e:run:single
          pnpm --filter ./packages/telescope-client test:e2e:run:multi
