name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Align with GitHub Actions Node 24 default; silences deprecation warnings on actions that still declare Node 20.
# See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Pinned VS Code for @vscode/test-electron; override to debug a specific release.
  VSCODE_TEST_VERSION: "1.105.0"
  CORE_COVERAGE_TARGET: "95.0"
  # Per-new-file target is 80%, enforced by coverage-enforce-packages.sh.
  # Aggregate core/repo floors are the highest value currently achievable
  # without waiving tests that have never landed; follow-up work in
  # server/{wiretap,vacuum,bundle,overlay,lsp/bun} is tracked to pull
  # these toward the per-file 80% bar and ultimately the 95% finish line.
  CORE_COVERAGE_RATCHET_MIN: "75.5"
  # Lowered from 77.7 alongside the pb33f integration PR (bundle/diff/docs/
  # mock/overlay/vacuum/wiretap + contract runner) which added ~10k lines
  # with modest initial coverage, then lifted alongside the barrelman
  # autofix PR which added fix_test.go / fix_ratchet_test.go /
  # sailpoint_fixes_test.go covering the new surface at ≥80%.
  REPO_COVERAGE_RATCHET_MIN: "74.5"

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install workspace deps (Bun custom rule fixtures)
        run: pnpm install --frozen-lockfile

      - uses: oven-sh/setup-bun@v2

      - name: Bundle Bun sidecar
        run: bash lsp/bun/runner/build.sh
        working-directory: server

      - name: Build
        run: go build ./...
        working-directory: server

      - name: Vet
        run: go vet ./...
        working-directory: server

      - name: Dep guard (core has no LSP deps)
        shell: bash
        run: |
          if go list -deps ./core/... 2>/dev/null | grep -qE 'protocol|jsonrpc'; then
            echo "ERROR: core/ packages must not depend on protocol or jsonrpc"
            go list -deps ./core/... | grep -E 'protocol|jsonrpc'
            exit 1
          fi
        working-directory: server

      - name: Test
        shell: bash
        run: go test -race -coverprofile=coverage.out -covermode=atomic -timeout 10m ./...
        working-directory: server

      - name: Coverage summary
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          awk '
            NR == 1 { print; next }
            $1 ~ /^github.com\/sailpoint-oss\/telescope\/server\/[^/]+\.go:/ { next }
            $1 ~ /^github.com\/sailpoint-oss\/telescope\/server\/rules\/testing\// { next }
            $1 ~ /^github.com\/sailpoint-oss\/telescope\/server\/testutil\/[^/]+\.go:/ { next }
            { print }
          ' coverage.out > repo-coverage.out
          REPO_TOTAL="$(go tool cover -func=repo-coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')"
          CORE_PKGS=(./lsp/... ./openapi ./project ./bridge ./core/graph ./core/classify)
          go test -coverprofile=core-coverage.out "${CORE_PKGS[@]}"
          CORE_TOTAL="$(go tool cover -func=core-coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')"
          {
            echo "### Coverage"
            echo "- Core Tier A: ${CORE_TOTAL}% (target ${CORE_COVERAGE_TARGET}%, ratchet floor ${CORE_COVERAGE_RATCHET_MIN}%)"
            echo "- Repo-wide: ${REPO_TOTAL}% (ratchet floor ${REPO_COVERAGE_RATCHET_MIN}%)"
            echo "  - excludes helper-only packages: \`server\`, \`server/rules/testing\`, \`server/testutil\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "core_coverage=${CORE_TOTAL}" >> "$GITHUB_OUTPUT"
          echo "repo_coverage=${REPO_TOTAL}" >> "$GITHUB_OUTPUT"
        working-directory: server
        id: coverage_summary

      - name: Per-package Go coverage table
        if: matrix.os == 'ubuntu-latest'
        run: |
          {
            echo "### Per-package coverage (statements)"
            echo "Sorted ascending. Helper roots \`rules/testing\`, \`testutil\`, and empty package key (server main) are skipped by \`--min-pct\` enforcement only."
            echo ""
            python3 ../scripts/coverage-go-packages.py coverage.out
          } >> "$GITHUB_STEP_SUMMARY"
        working-directory: server

      - name: Enforce coverage ratchets
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          core="${{ steps.coverage_summary.outputs.core_coverage }}"
          repo="${{ steps.coverage_summary.outputs.repo_coverage }}"
          awk -v current="$core" -v floor="$CORE_COVERAGE_RATCHET_MIN" 'BEGIN { exit !(current + 0 >= floor + 0) }' \
            || { echo "Core coverage ${core}% is below ratchet floor ${CORE_COVERAGE_RATCHET_MIN}%"; exit 1; }
          awk -v current="$repo" -v floor="$REPO_COVERAGE_RATCHET_MIN" 'BEGIN { exit !(current + 0 >= floor + 0) }' \
            || { echo "Repo coverage ${repo}% is below ratchet floor ${REPO_COVERAGE_RATCHET_MIN}%"; exit 1; }
          awk -v current="$core" -v target="$CORE_COVERAGE_TARGET" 'BEGIN { exit !(current + 0 >= target + 0) }' \
            || { echo "::warning::Core Tier A ${core}% is below finish line ${CORE_COVERAGE_TARGET}% (ratchet still enforced)"; exit 0; }
          awk -v current="$repo" -v target="$CORE_COVERAGE_TARGET" 'BEGIN { exit !(current + 0 >= target + 0) }' \
            || { echo "::warning::Filtered repo ${repo}% is below finish line ${CORE_COVERAGE_TARGET}% (ratchet still enforced)"; exit 0; }

      - name: Per-package coverage 95% gate (strict)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: bash ../scripts/coverage-enforce-packages.sh
        working-directory: server

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: |
            server/coverage.out
            server/repo-coverage.out
            server/core-coverage.out

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks (current)
        run: go test -bench=. -benchmem -count=5 -timeout 10m ./bench/ | tee bench-new.txt
        working-directory: server

      - name: Run benchmarks (base)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          git stash || true
          git checkout ${{ github.event.pull_request.base.sha }}
          if [ -f server/go.mod ]; then
            cd server && go test -bench=. -benchmem -count=5 -timeout 10m ./bench/ | tee ../bench-old.txt || true
          else
            echo "No Go server on base branch, skipping base benchmark"
          fi
          git checkout - || true
          git stash pop || true

      - name: Compare with benchstat
        if: github.event_name == 'pull_request'
        run: |
          if [ -f bench-old.txt ]; then
            echo "## Benchmark Comparison" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            benchstat server/bench-new.txt bench-old.txt | tee -a $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: server/bench-new.txt

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run client typecheck
        run: pnpm --filter ./client run typecheck

      - name: Build extension
        run: pnpm --filter ./client run build

      - name: Run client unit tests
        run: pnpm --filter ./client run test

      - name: Run Bun sidecar runner tests
        run: pnpm --filter ./server/lsp/bun/runner run test

  e2e:
    name: E2E (${{ matrix.os }})
    needs: [go, typescript]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: oven-sh/setup-bun@v2

      - name: Restore VS Code test downloads
        uses: actions/cache@v4
        with:
          path: client/.vscode-test
          key: vscode-test-${{ matrix.os }}-${{ hashFiles('client/package.json', 'client/src/test/vscode-test-version.ts') }}
          restore-keys: |
            vscode-test-${{ matrix.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Rebuilds Go server into client/bin, extension bundle, and out/test. Must run
      # before any test:e2e:run:* so CI uses a server binary that matches server/lsp
      # and the packaged Bun sidecar bundle used by extension-host tests.
      - name: Build and compile E2E
        run: pnpm --filter ./client test:e2e:compile

      - name: Record E2E VS Code pin
        shell: bash
        run: |
          echo "### E2E VS Code" >> "$GITHUB_STEP_SUMMARY"
          echo "- VSCODE_TEST_VERSION=${VSCODE_TEST_VERSION}" >> "$GITHUB_STEP_SUMMARY"

      - name: Install xvfb (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run E2E tests single-root (Linux)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 15
        env:
          TELESCOPE_E2E_SMOKE: ""
        run: xvfb-run -a pnpm --filter ./client test:e2e:run:single

      - name: Run E2E tests multi-root (Linux)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 20
        env:
          TELESCOPE_E2E_SMOKE: ""
        run: xvfb-run -a pnpm --filter ./client test:e2e:run:multi

      - name: Run E2E tests single-root (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        timeout-minutes: 15
        shell: bash
        env:
          TELESCOPE_E2E_SMOKE: ""
        run: pnpm --filter ./client test:e2e:run:single

      - name: Run E2E tests multi-root (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        timeout-minutes: 20
        shell: bash
        env:
          TELESCOPE_E2E_SMOKE: ""
        run: pnpm --filter ./client test:e2e:run:multi

      - name: Summarize E2E results
        if: always()
        shell: bash
        run: |
          {
            echo "### E2E Summary (${{ matrix.os }})"
            echo ""
            echo "- Single-root / multi-root E2E: see step results above (${{ job.status }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload VS Code test host logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-test-logs-${{ matrix.os }}
          path: client/.vscode-test
          if-no-files-found: ignore

  e2e_sidecar:
    name: E2E Sidecar (${{ matrix.os }})
    needs: [go, typescript]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: oven-sh/setup-bun@v2

      - name: Restore VS Code test downloads
        uses: actions/cache@v4
        with:
          path: client/.vscode-test
          key: vscode-test-${{ matrix.os }}-${{ hashFiles('client/package.json', 'client/src/test/vscode-test-version.ts') }}
          restore-keys: |
            vscode-test-${{ matrix.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Keep sidecar on a fresh runner with a freshly compiled extension so this
      # required PR gate isolates Bun-at-runtime wiring failures from single/multi-root host failures.
      - name: Build and compile E2E
        run: pnpm --filter ./client test:e2e:compile

      - name: Record E2E VS Code pin
        shell: bash
        run: |
          echo "### E2E Sidecar VS Code" >> "$GITHUB_STEP_SUMMARY"
          echo "- VSCODE_TEST_VERSION=${VSCODE_TEST_VERSION}" >> "$GITHUB_STEP_SUMMARY"

      - name: Install xvfb (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run E2E sidecar tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 15
        env:
          TELESCOPE_E2E_SMOKE: ""
        run: xvfb-run -a pnpm --filter ./client test:e2e:run:sidecar

      - name: Run E2E sidecar tests (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        timeout-minutes: 15
        shell: bash
        env:
          TELESCOPE_E2E_SMOKE: ""
        run: pnpm --filter ./client test:e2e:run:sidecar

      - name: Summarize E2E sidecar results
        if: always()
        shell: bash
        run: |
          {
            echo "### E2E Sidecar Summary (${{ matrix.os }})"
            echo ""
            echo "- Sidecar E2E: see step results above (${{ job.status }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload VS Code test host logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-test-sidecar-logs-${{ matrix.os }}
          path: client/.vscode-test
          if-no-files-found: ignore
