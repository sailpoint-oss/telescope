name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Run unit tests
        run: pnpm test

      - name: Build extension
        run: |
          pnpm --filter telescope-server run build
          pnpm --filter telescope-client run build

      - name: Run E2E tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          xvfb-run -a pnpm test:e2e

      - name: Run E2E tests (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        run: pnpm test:e2e

      - name: Cache VS Code test downloads
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            ~/.vscode-test
            ${{ runner.temp }}/.vscode-test
          key: vscode-test-${{ matrix.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            vscode-test-${{ matrix.os }}-

