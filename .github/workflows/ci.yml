name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Build Bun runner
        run: bash lsp/bun/runner/build.sh
        working-directory: server

      - name: Build
        run: go build ./...
        working-directory: server

      - name: Vet
        run: go vet ./...
        working-directory: server

      - name: Dep guard (core has no LSP deps)
        run: |
          if go list -deps ./core/... 2>/dev/null | grep -qE 'protocol|jsonrpc'; then
            echo "ERROR: core/ packages must not depend on protocol or jsonrpc"
            go list -deps ./core/... | grep -E 'protocol|jsonrpc'
            exit 1
          fi
        working-directory: server

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./... -timeout 10m
        working-directory: server

      - name: Coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -func=coverage.out | tail -1
        working-directory: server

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: server/coverage.out

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Build Bun runner
        run: bash lsp/bun/runner/build.sh
        working-directory: server

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks (current)
        run: go test -bench=. -benchmem -count=5 -timeout 10m ./bench/ | tee bench-new.txt
        working-directory: server

      - name: Run benchmarks (base)
        if: github.event_name == 'pull_request'
        run: |
          git stash
          git checkout ${{ github.event.pull_request.base.sha }}
          go test -bench=. -benchmem -count=5 -timeout 10m ./bench/ | tee bench-old.txt || true
          git checkout -
          git stash pop || true
        working-directory: server

      - name: Compare with benchstat
        if: github.event_name == 'pull_request'
        run: |
          if [ -f bench-old.txt ]; then
            echo "## Benchmark Comparison" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            benchstat bench-old.txt bench-new.txt | tee -a $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
        working-directory: server

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: server/bench-new.txt

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build extension
        run: pnpm --filter ./client run build

      - name: Run client unit tests
        run: pnpm --filter ./client run test

  e2e:
    name: E2E (${{ matrix.os }})
    needs: [go, typescript]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: oven-sh/setup-bun@v2

      - name: Restore VS Code test downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.vscode-test
            ${{ runner.temp }}/.vscode-test
          key: vscode-test-${{ matrix.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            vscode-test-${{ matrix.os }}-

      - name: Install dependencies
        run: pnpm install

      - name: Build Bun runner
        run: bash server/lsp/bun/runner/build.sh

      - name: Build and compile E2E
        run: pnpm --filter ./client test:e2e:compile

      - name: Run E2E tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          xvfb-run -a pnpm --filter ./client test:e2e:run:single
          xvfb-run -a pnpm --filter ./client test:e2e:run:multi
          xvfb-run -a pnpm --filter ./client test:e2e:run:sidecar

      - name: Run E2E tests (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        run: |
          pnpm --filter ./client test:e2e:run:single
          pnpm --filter ./client test:e2e:run:multi
          pnpm --filter ./client test:e2e:run:sidecar
