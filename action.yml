name: "Telescope"
description: "All-in-one OpenAPI platform: lint, validate, diff, test, and document."
branding:
  icon: "search"
  color: "blue"

inputs:
  mode:
    description: "Comma-separated modes: lint, validate, ci, diff, contract, docs"
    default: "ci"
  go-version:
    description: "Go version used to build Telescope"
    default: "1.25.x"
  working-directory:
    description: "Workspace directory to analyze"
    default: "."
  paths:
    description: "Space-separated file or directory paths to analyze"
    default: "."
  config:
    description: "Optional Telescope config path"
    default: ""
  ruleset:
    description: "Optional ruleset path"
    default: ""
  lint-engine:
    description: "Lint engine: barrelman, vacuum, or both"
    default: "barrelman"
  vacuum-ruleset:
    description: "Optional vacuum-compatible ruleset path"
    default: ""
  diff-base:
    description: "Base ref for ci mode"
    default: "main"
  diff-head:
    description: "Head ref for ci mode"
    default: "HEAD"
  report-scope:
    description: "CI report scope: changed (graph-expanded impact) or all configured files"
    default: "changed"
  severity:
    description: "Optional minimum severity filter"
    default: ""
  fail-on:
    description: "Failure threshold: error or warn"
    default: "error"
  no-external-lsp:
    description: "Deprecated no-op; retained for compatibility"
    default: "false"
  comment-pr:
    description: "Post PR comment in ci mode"
    default: "true"
  report-md:
    description: "Markdown report output path"
    default: "telescope-report.md"
  report-json:
    description: "JSON report output path"
    default: "telescope-report.json"
  report-sarif:
    description: "SARIF report output path"
    default: ""
  fail-on-breaking:
    description: "CI/diff: exit 1 when libopenapi finds breaking API changes"
    default: "true"
  breaking-config:
    description: "Optional path to openapi-changes-style breaking rules YAML"
    default: ""
  diff-left:
    description: "diff mode: original spec (file path or REF:path)"
    default: ""
  diff-right:
    description: "diff mode: updated spec (file path or REF:path)"
    default: ""
  diff-format:
    description: "diff mode output format: text, json, markdown, sarif"
    default: "json"
  diff-output:
    description: "diff mode: write report to this path (under workspace)"
    default: "telescope-breaking.json"
  contract-base-url:
    description: "Base URL for contract test mode"
    default: ""
  contract-spec:
    description: "Spec path for contract test mode"
    default: ""
  contract-wiretap:
    description: "Enable wiretap proxy validation in contract mode"
    default: "false"
  docs-output:
    description: "Output directory for docs mode"
    default: "telescope-docs"
  docs-publish:
    description: "Build documentation for static hosting"
    default: "false"

outputs:
  report-md:
    description: "Markdown report path"
    value: ${{ steps.run.outputs.report-md }}
  report-json:
    description: "JSON report path"
    value: ${{ steps.run.outputs.report-json }}
  report-sarif:
    description: "SARIF report path"
    value: ${{ steps.run.outputs.report-sarif }}
  lint-findings:
    description: "Total lint and validation findings"
    value: ${{ steps.run.outputs.lint-findings }}
  breaking-changes:
    description: "Total breaking changes detected"
    value: ${{ steps.run.outputs.breaking-changes }}
  contract-passed:
    description: "Passing contract tests"
    value: ${{ steps.run.outputs.contract-passed }}
  contract-failed:
    description: "Failing contract tests"
    value: ${{ steps.run.outputs.contract-failed }}
  exit-code:
    description: "Overall exit code"
    value: ${{ steps.run.outputs.exit-code }}
  error:
    description: "Error message if the action run failed"
    value: ${{ steps.run.outputs.error }}

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: true
        cache-dependency-path: server/go.sum

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Bundle Bun sidecar
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ github.action_path }}/server"
        bash lsp/bun/runner/build.sh

    - name: Build Telescope
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ github.action_path }}/server"
        go build -ldflags "-X github.com/sailpoint-oss/telescope/server/lsp.Version=action" -o ../telescope .

    - name: Run Telescope
      id: run
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        MODE: ${{ inputs.mode }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        PATHS: ${{ inputs.paths }}
        CONFIG_PATH: ${{ inputs.config }}
        RULESET_PATH: ${{ inputs.ruleset }}
        LINT_ENGINE: ${{ inputs.lint-engine }}
        VACUUM_RULESET: ${{ inputs.vacuum-ruleset }}
        DIFF_BASE: ${{ inputs.diff-base }}
        DIFF_HEAD: ${{ inputs.diff-head }}
        REPORT_SCOPE: ${{ inputs.report-scope }}
        SEVERITY: ${{ inputs.severity }}
        FAIL_ON: ${{ inputs.fail-on }}
        NO_EXTERNAL_LSP: ${{ inputs.no-external-lsp }}
        COMMENT_PR: ${{ inputs.comment-pr }}
        REPORT_MD: ${{ inputs.report-md }}
        REPORT_JSON: ${{ inputs.report-json }}
        REPORT_SARIF: ${{ inputs.report-sarif }}
        FAIL_ON_BREAKING: ${{ inputs.fail-on-breaking }}
        BREAKING_CONFIG: ${{ inputs.breaking-config }}
        DIFF_LEFT: ${{ inputs.diff-left }}
        DIFF_RIGHT: ${{ inputs.diff-right }}
        DIFF_FORMAT: ${{ inputs.diff-format }}
        DIFF_OUTPUT: ${{ inputs.diff-output }}
        CONTRACT_BASE_URL: ${{ inputs.contract-base-url }}
        CONTRACT_SPEC: ${{ inputs.contract-spec }}
        CONTRACT_WIRETAP: ${{ inputs.contract-wiretap }}
        DOCS_OUTPUT: ${{ inputs.docs-output }}
        DOCS_PUBLISH: ${{ inputs.docs-publish }}
        TELESCOPE_BIN: ${{ github.action_path }}/telescope
      run: |
        bash "${{ github.action_path }}/scripts/run-action.sh"
