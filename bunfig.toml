[test]
# Enable coverage by default for all test runs
coverage = true

# Skip test files from coverage reports (only count source files)
coverageSkipTestFiles = true

# Coverage output directory (lcov reports saved here)
coverageDir = "./coverage"

# Coverage reporters:
# - "text": Shows coverage table in console
# - "lcov": Generates lcov.info file for CI/tooling (e.g., Codecov, Coveralls)
coverageReporter = ["text", "lcov"]

# Coverage thresholds - test run fails if coverage falls below these
# Current targets: 75% line coverage, 75% function coverage (can be adjusted per package)
coverageThreshold = { line = 0.75, function = 0.75 }

# Exclude schema definitions from coverage calculations. These files are largely
# declarative (Zod schema shapes + metadata) and otherwise drown out coverage
# signals for the executable engine/LSP logic.
coveragePathIgnorePatterns = [
  "packages/telescope-server/src/engine/schemas/**",
]