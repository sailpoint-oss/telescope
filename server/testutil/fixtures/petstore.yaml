openapi: "3.1.0"
info:
  title: Petstore
  description: A sample API for pets
  version: "1.0.0"
  contact:
    name: API Team
    email: api@example.com
  license:
    name: MIT
servers:
  - url: https://api.example.com/v1
    description: Production
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      description: Returns all pets from the store
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          description: How many items to return
          required: false
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "500":
          description: Server error
    post:
      operationId: createPet
      summary: Create a pet
      description: Creates a new pet in the store
      tags:
        - pets
      requestBody:
        description: Pet to create
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "201":
          description: Pet created
        "400":
          description: Invalid input
        "500":
          description: Server error
  /pets/{petId}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      description: Returns a single pet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          description: The ID of the pet
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: A pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found
        "500":
          description: Server error
components:
  schemas:
    Pet:
      type: object
      description: A pet in the store
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        tag:
          type: string
          maxLength: 50
        status:
          type: string
          enum:
            - available
            - pending
            - sold
          description: Pet status in the store
    Error:
      type: object
      description: An error response
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
          maxLength: 500
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
tags:
  - name: pets
    description: Pet operations
