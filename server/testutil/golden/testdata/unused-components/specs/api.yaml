openapi: "3.1.0"
info:
  title: Unused Component Test
  version: "1.0"
paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    UnusedSchema:
      type: object
      properties:
        foo:
          type: string
    AlsoUnused:
      type: object
      properties:
        bar:
          type: integer
