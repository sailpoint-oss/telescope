openapi: "3.1.0"
info:
  title: Circular Ref Test
  version: "1.0"
paths:
  /nodes:
    get:
      summary: Get nodes
      operationId: getNodes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Node"
components:
  schemas:
    Node:
      type: object
      properties:
        id:
          type: string
        children:
          type: array
          items:
            $ref: "#/components/schemas/Node"
