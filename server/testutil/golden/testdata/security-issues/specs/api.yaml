openapi: "3.1.0"
info:
  title: Security Issues Test
  version: "1.0"
paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
    Unused:
      type: object
      properties:
        x:
          type: string
  securitySchemes:
    UnusedKey:
      type: apiKey
      in: query
      name: api_key
