openapi: "3.1.0"
info:
  title: Multiple Violations Test
  version: "1.0"
paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
    OrphanA:
      type: object
      properties:
        a:
          type: string
    OrphanB:
      type: object
      properties:
        b:
          type: integer
