# This file should produce diagnostics from every example Go plugin rule.
# Each violation is annotated with the rule it triggers.
#
# Expected diagnostics:
#   require-security          x2  (GET /animals/, POST /animals/)
#   operation-summary-required x2  (GET /animals/, POST /animals/)
#   schema-pascal-case        x1  (user_profile)
#   request-body-required     x1  (POST /animals/ body not required)
#   no-trailing-slash         x1  (/animals/)
#   server-url-https          x1  (http://api.example.com)
#   parameter-description-required x1 (limit param)
#   response-description-required  x2 (200 on GET, 201 on POST)
#   tag-description-required  x1  (Animals tag)
#   security-scheme-description x1 (apiKey scheme)

openapi: "3.1.0"
info:
  title: Plugin Rules - All Failing
  version: 1.0.0
  description: Every element in this spec deliberately violates an example plugin rule.

# server-url-https: uses HTTP
servers:
  - url: http://api.example.com/v1

# tag-description-required: missing description
tags:
  - name: Animals

paths:
  # no-trailing-slash: trailing slash present
  /animals/:
    get:
      # require-security: no security
      # operation-summary-required: no summary
      operationId: listAnimals
      description: Returns a list of animals
      tags:
        - Animals
      parameters:
        # parameter-description-required: missing description
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        # response-description-required: missing description
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/user_profile"

    post:
      # require-security: no security
      # operation-summary-required: no summary
      operationId: createAnimal
      description: Create a new animal
      tags:
        - Animals
      # request-body-required: required not set (defaults to false)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        # response-description-required: missing description
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/user_profile"

components:
  schemas:
    # schema-pascal-case: snake_case name
    user_profile:
      type: object
      properties:
        id:
          type: string
        display_name:
          type: string

  securitySchemes:
    # security-scheme-description: missing description
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
