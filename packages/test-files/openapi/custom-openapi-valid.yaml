# Valid spec for Go plugin rule testing.
# This file should produce zero diagnostics from the example-rules plugin.
openapi: "3.0.0"
info:
  title: Custom Plugin Test - Valid
  version: 1.0.0
  description: A minimal valid API exercising Go plugin rules

servers:
  - url: https://api.example.com
    description: Production

tags:
  - name: Pets
    description: Pet management

paths:
  /pets:
    get:
      summary: Get all pets
      operationId: getPets
      description: Retrieve every pet in the store
      tags:
        - Pets
      security:
        - oauth2: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by pet status
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"

    post:
      summary: Create a pet
      operationId: createPet
      description: Add a new pet to the store
      tags:
        - Pets
      security:
        - oauth2: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "201":
          description: Created

components:
  schemas:
    Pet:
      type: object
      description: A pet
      properties:
        id:
          type: string
          description: Unique ID
        name:
          type: string
          description: Pet name

  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth2 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://example.com/oauth/authorize
          tokenUrl: https://example.com/oauth/token
          scopes:
            read: Read access
